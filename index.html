<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>F&F Hub</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<!-- ── AUTH SCREEN ───────────────────────────────────────────────────────── -->
<div id="auth-screen">
  <div class="auth-bg"></div>
  <div class="auth-card">
    <div class="auth-logo">
      <div class="nav-logo-icon">🔥</div>
      F&F <span>HUB</span>
    </div>
    <div class="auth-title" id="auth-title">Welcome Back</div>
    <div class="auth-sub" id="auth-sub">Sign in to enter the hub</div>

    <div class="auth-tabs">
      <button class="auth-tab active" id="auth-tab-login">Sign In</button>
      <button class="auth-tab" id="auth-tab-register">Register</button>
    </div>

    <div id="auth-error" class="auth-error hidden"></div>

    <div class="auth-field">
      <label>Email</label>
      <input type="email" id="auth-email" placeholder="your@email.com" />
    </div>
    <div class="auth-field">
      <label>Password</label>
      <input type="password" id="auth-password" placeholder="At least 6 characters" />
    </div>
    <div class="auth-field hidden" id="auth-confirm-field">
      <label>Confirm Password</label>
      <input type="password" id="auth-confirm" placeholder="Enter password again" />
    </div>

    <button class="auth-btn" id="auth-btn">🔓 Sign In</button>

    <div class="auth-divider"><span>or</span></div>
    <button class="auth-google-btn" id="auth-google-btn">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      Continue with Google
    </button>

    <div class="auth-quote">"FAMILY IS NOT AN IMPORTANT THING – IT'S EVERYTHING."</div>
  </div>
</div>

<!-- ── APP ───────────────────────────────────────────────────────────────── -->
<div id="app" class="hidden">
  <nav class="nav">
    <a href="#" data-page="home" class="nav-logo">
      <div class="nav-logo-icon">🔥</div>
      <span id="nav-site-name">F&F <span style="color:var(--red)">HUB</span></span>
    </a>
    <div class="nav-links">
      <a href="#" data-page="movies">MOVIES</a>
      <a href="#" data-page="characters">CHARACTERS</a>
      <a href="#" data-page="cars">CARS</a>
      <a href="#" data-page="quotes">QUOTES</a>
      <a href="#" data-page="news">NEWS</a>
      <a href="#" data-page="paul-walker">PAUL WALKER</a>
    </div>
    <div class="nav-right">
      <a href="admin.html" class="nav-btn">⚙️ ADMIN</a>
      <button id="nav-logout" class="nav-btn">🚪 Sign Out</button>
    </div>
  </nav>

  <main id="main-content">
    <div class="loading-screen">
      <div style="font-size:32px">🔥</div>
      <div class="loading-spinner"></div>
    </div>
  </main>
</div>

<script type="module" src="js/app.js"></script>
</body>
</html>
