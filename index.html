<!DOCTYPE html>
<html lang="he">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>F&F Hub</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<!-- ── AUTH SCREEN ───────────────────────────────────────────────────────── -->
<div id="auth-screen">
  <div class="auth-bg"></div>
  <div class="auth-card">
    <div class="auth-logo">
      <div class="nav-logo-icon">🔥</div>
      F&F <span>HUB</span>
    </div>
    <div class="auth-title" id="auth-title">ברוך הבא</div>
    <div class="auth-sub" id="auth-sub">התחבר כדי להיכנס לאתר</div>

    <div class="auth-tabs">
      <button class="auth-tab active" id="auth-tab-login">התחברות</button>
      <button class="auth-tab" id="auth-tab-register">הרשמה</button>
    </div>

    <div id="auth-error" class="auth-error hidden"></div>

    <div class="auth-field">
      <label>אימייל</label>
      <input type="email" id="auth-email" placeholder="your@email.com" />
    </div>
    <div class="auth-field">
      <label>סיסמה</label>
      <input type="password" id="auth-password" placeholder="לפחות 6 תווים" />
    </div>
    <div class="auth-field hidden" id="auth-confirm-field">
      <label>אימות סיסמה</label>
      <input type="password" id="auth-confirm" placeholder="הכנס סיסמה שוב" />
    </div>

    <button class="auth-btn" id="auth-btn">🔓 כניסה</button>
    <div class="auth-quote">"FAMILY IS NOT AN IMPORTANT THING – IT'S EVERYTHING."</div>
  </div>
</div>

<!-- ── APP ───────────────────────────────────────────────────────────────── -->
<div id="app" class="hidden">
  <nav class="nav">
    <a href="#" data-page="home" class="nav-logo">
      <div class="nav-logo-icon">🔥</div>
      <span id="nav-site-name">F&F <span style="color:var(--red)">HUB</span></span>
    </a>
    <div class="nav-links">
      <a href="#" data-page="movies">MOVIES</a>
      <a href="#" data-page="characters">CHARACTERS</a>
      <a href="#" data-page="cars">CARS</a>
      <a href="#" data-page="quotes">QUOTES</a>
      <a href="#" data-page="news">NEWS</a>
      <a href="#" data-page="paul-walker">PAUL WALKER</a>
    </div>
    <div class="nav-right">
      <a href="admin.html" class="nav-btn">⚙️ ADMIN</a>
      <button id="nav-logout" class="nav-btn">🚪 יציאה</button>
    </div>
  </nav>

  <main id="main-content">
    <div class="loading-screen">
      <div style="font-size:32px">🔥</div>
      <div class="loading-spinner"></div>
    </div>
  </main>
</div>

<script type="module" src="js/app.js"></script>
</body>
</html>
